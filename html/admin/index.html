<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ADMIN ONLY - Restricted Access</title>
    <style>
        /* Basic reset and clean white background */
        body {
            margin: 0;
            padding: 0;
            background-color: #ffffff;
            /* White background */
            color: #1a1a1a;
            /* Dark gray text for readability */
            font-family: 'Helvetica Neue', Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            text-transform: uppercase;
        }

        .container {
            text-align: center;
            border: 8px solid #cc0000;
            /* Bold red border for warning */
            padding: 3rem;
            max-width: 90%;
            background-color: #fffafa;
            /* Very light red tint for the box */
        }

        h1 {
            font-size: 3.5rem;
            margin: 0;
            letter-spacing: 8px;
            color: #cc0000;
            /* Red title */
        }

        hr {
            border: none;
            border-top: 3px solid #1a1a1a;
            margin: 20px 0;
        }

        p {
            font-size: 1.4rem;
            font-weight: 900;
            margin: 10px 0;
        }

        .sub-text {
            font-size: 0.9rem;
            color: #666;
            margin-top: 20px;
            letter-spacing: 1px;
        }

        /* Attention-grabbing blink animation */
        .blink {
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% {
                opacity: 1;
            }

            50% {
                opacity: 0.3;
            }

            100% {
                opacity: 1;
            }
        }
    </style>
</head>

<body>

    <div class="container">
        <h1 class="blink">RESTRICTED</h1>
        <hr>
        <p>ADMINISTRATION ONLY</p>
        <div class="sub-text"> </div>
    </div>

</body>

</html>
